site_name: go-ruby-marshal docs
site_description: "A pure-Go (CGO=0) implementation of Ruby's Marshal binary serialization (v4.8), byte-for-byte identical to MRI."
site_url: https://go-ruby-marshal.github.io/docs/
repo_url: https://github.com/go-ruby-marshal
repo_name: go-ruby-marshal
edit_uri: ""

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
  palette:
    # System default (follows the OS preference), then explicit light and dark.
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

extra:
  version:
    provider: mike
    default: latest

nav:
  - Home: index.md
  - API: api.md
  - The Marshal format: format.md
  - Performance: performance.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
